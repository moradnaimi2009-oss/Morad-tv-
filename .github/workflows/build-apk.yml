name: Build Morad TV APK (Native)

on:
  workflow_dispatch: {}
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # The exported project is missing gradle/wrapper/gradle-wrapper.jar
      # (binary files often get dropped by web-based export tools), so we
      # install Gradle directly instead of relying on ./gradlew.
      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: morad-tv-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
